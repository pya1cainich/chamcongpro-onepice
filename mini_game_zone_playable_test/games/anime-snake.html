<!DOCTYPE html>
<html lang="vi" data-game="snake">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Anime Snake</title>
<style>
/* Mini game ƒë·ªôc l·∫≠p ƒë·ªÉ g·∫Øn v√Ýo ChamCongPro: HTML/CSS/JS trong 1 file */
*{box-sizing:border-box;margin:0;padding:0}
:root{--glow:0}
html,body{width:100%;min-height:100%}
body{
  min-height:100dvh;overflow:auto;color:#fff;font-family:"Segoe UI",Arial,sans-serif;
  display:flex;justify-content:center;align-items:flex-start;padding:0;
  background:
    radial-gradient(circle at 15% 20%,rgba(255,126,199,.55),transparent 28%),
    radial-gradient(circle at 85% 15%,rgba(115,190,255,.5),transparent 30%),
    linear-gradient(135deg,#120024,#1b0647 48%,#050919);
}
body:before{
  content:"";position:fixed;inset:-20%;z-index:0;pointer-events:none;filter:blur(8px);
  background:radial-gradient(circle,rgba(255,80,190,calc(.08 + var(--glow)*.16)),transparent 30%);
  animation:pulse 3s ease-in-out infinite;
}
@keyframes pulse{50%{transform:scale(1.06) rotate(2deg);opacity:1}}
#petals{position:fixed;inset:0;z-index:1;overflow:hidden;pointer-events:none}
.petal{
  position:absolute;top:-48px;width:16px;height:10px;border-radius:70% 20% 70% 20%;
  background:rgba(255,179,221,.9);filter:drop-shadow(0 0 8px rgba(255,165,220,.8));
  animation:fall linear infinite;
}
.petal.fast{filter:drop-shadow(0 0 12px rgba(255,110,210,.95))}
@keyframes fall{
  0%{transform:translateY(-70px) rotate(0) translateX(0) scale(var(--s,1));opacity:0}
  10%{opacity:var(--o,.8)}
  100%{transform:translateY(115vh) rotate(860deg) translateX(var(--d,80px)) scale(var(--s,1));opacity:0}
}
.box{
  position:relative;z-index:2;width:min(100vw,760px);margin:0 auto;padding:clamp(8px,1.6vw,14px);
  border:1px solid rgba(255,255,255,.18);border-radius:20px;background:rgba(11,8,36,.72);
  backdrop-filter:blur(16px);
  box-shadow:0 0 calc(35px + var(--glow)*30px) rgba(255,79,190,.34),0 0 calc(75px + var(--glow)*55px) rgba(82,170,255,.22),inset 0 0 26px rgba(255,255,255,.06);
}
.top{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;margin-bottom:8px}
.title{display:flex;align-items:center;gap:8px}
h1{font-size:clamp(22px,4vw,34px);white-space:nowrap;text-shadow:0 0 14px rgba(255,107,205,.85)}
.sound{width:38px;height:38px;padding:0;border-radius:50%;font-size:18px;background:rgba(255,255,255,.13);border:1px solid rgba(255,255,255,.2)}
.stats{display:grid;grid-template-columns:repeat(3,minmax(74px,1fr));gap:8px}
.card{min-width:74px;padding:8px;border-radius:18px;text-align:center;background:linear-gradient(135deg,rgba(255,78,183,.22),rgba(64,174,255,.18));border:1px solid rgba(255,255,255,.18)}
.card span{display:block;font-size:12px;color:#d8dcff}.card b{font-size:clamp(20px,3.5vw,26px);text-shadow:0 0 12px rgba(91,201,255,.9)}
.board{--bs:min(100%,720px,calc(100dvh - 112px));position:relative;width:var(--bs);margin:auto;padding:6px;border-radius:20px;background:linear-gradient(135deg,rgba(255,99,197,.5),rgba(89,188,255,.42))}
canvas{display:block;width:100%;height:auto;aspect-ratio:1/1;border-radius:16px;background:#09091d;touch-action:none;box-shadow:inset 0 0 26px rgba(91,201,255,.18)}
.overlay{position:absolute;inset:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:22px;border-radius:18px;background:rgba(5,6,22,.76);backdrop-filter:blur(6px)}
.overlay.hide{display:none}.overlay h2{font-size:30px;margin-bottom:8px}.overlay p{max-width:380px;line-height:1.5;margin-bottom:16px;color:#e7e8ff}
.face{width:86px;height:86px;margin-bottom:10px;border-radius:50%;border:3px solid #fff;box-shadow:0 0 25px rgba(255,118,211,.85);background:radial-gradient(circle at 35% 40%,#fff 0 5px,#2a194a 6px 9px,transparent 10px),radial-gradient(circle at 65% 40%,#fff 0 5px,#2a194a 6px 9px,transparent 10px),radial-gradient(circle at 50% 70%,#ff73c7 0 5px,transparent 6px),linear-gradient(135deg,#ffd7ee,#ffc0e7 45%,#fff4fb)}
button{border:0;padding:12px 22px;border-radius:999px;color:#fff;font-weight:700;cursor:pointer;background:linear-gradient(135deg,#ff4fbb,#7b5cff,#39c6ff);box-shadow:0 0 18px rgba(255,79,187,.55)}
@media(max-width:560px){.top{grid-template-columns:1fr}.stats{grid-template-columns:repeat(3,1fr)}.card{min-width:0;padding:8px 6px}.card span{font-size:11px}}
@media(max-height:660px){.board{--bs:min(100%,720px,calc(100dvh - 96px))}}
body{overflow:hidden;align-items:stretch}
.box{width:min(100vw,860px);min-height:100dvh;padding:6px;border:0;border-radius:0;background:rgba(11,8,36,.64)}
.top{grid-template-columns:minmax(0,1fr) auto;gap:5px;margin-bottom:4px}
.title{gap:5px;min-width:0}
h1{font-size:clamp(14px,4vw,20px);overflow:hidden;text-overflow:ellipsis}
.back,.sound{width:30px;height:30px;padding:0;border-radius:50%;font-size:15px;background:rgba(255,255,255,.13);border:1px solid rgba(255,255,255,.2)}
.stats{grid-template-columns:repeat(3,minmax(48px,1fr));gap:4px}
.card{min-width:0;padding:4px 5px;border-radius:10px}
.card span{font-size:9px}.card b{font-size:clamp(14px,4vw,18px)}
.board{--bs:min(calc(100vw - 8px),calc(100dvh - 202px));padding:3px;border-radius:10px}
canvas{border-radius:8px}
.overlay{inset:5px;padding:14px;border-radius:10px}
.overlay h2{font-size:22px}.overlay p{font-size:13px;margin-bottom:12px}.face{width:56px;height:56px}
.snake-controls{position:fixed;left:50%;right:auto;bottom:calc(8px + env(safe-area-inset-bottom));transform:translateX(-50%);z-index:6;display:grid;grid-template-columns:repeat(3,64px);grid-template-rows:repeat(3,56px);gap:7px;opacity:.92;touch-action:none}
.snake-controls button{width:64px;height:56px;padding:0;border-radius:18px;font-size:24px;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.3);box-shadow:0 0 12px rgba(80,210,255,.24)}
.snake-controls button:active{transform:scale(.94);opacity:1}
.snake-controls .up{grid-column:2}.snake-controls .left{grid-column:1;grid-row:2}.snake-controls .right{grid-column:3;grid-row:2}.snake-controls .down{grid-column:2;grid-row:3}
@media (hover:none),(max-width:900px),(prefers-reduced-motion:reduce){
  body:before,#petals{display:none}
  .box,.overlay{backdrop-filter:none;box-shadow:none}
  canvas,.card,h1,button,.face{box-shadow:none;text-shadow:none}
}
</style>
</head>
<body>
<div id="petals"></div>
<main class="box">
  <div class="top">
    <div class="title">
      <button id="backBtn" class="back" type="button" title="Quay l·∫°i danh s√°ch game" data-game-i18n-title="backTitle">‚Äπ</button>
      <h1 data-game-i18n="title">Anime Snake</h1>
      <button id="soundBtn" class="sound" type="button" title="B·∫≠t/t·∫Øt √¢m thanh" data-game-i18n-title="soundTitle">üîä</button>
    </div>
    <div class="stats">
      <div class="card"><span data-game-i18n="score">ƒêi·ªÉm</span><b id="score">0</b></div>
      <div class="card"><span data-game-i18n="time">Th·ªùi gian</span><b id="time">00:00</b></div>
      <div class="card"><span data-game-i18n="level">C·∫•p</span><b id="level">1</b></div>
    </div>
  </div>
  <section class="board">
    <canvas id="game" width="480" height="480"></canvas>
    <div class="overlay" id="overlay">
      <div class="face"></div>
      <h2 id="msgTitle" data-game-i18n="ready">S·∫µn s√Ýng?</h2>
      <p id="msgText" data-game-i18n="intro">ƒÇn ng·ªçc nƒÉng l∆∞·ª£ng ƒë·ªÉ ƒë·∫°t ƒëi·ªÉm cao nh·∫•t.</p>
      <button id="startBtn" data-game-i18n="start">B·∫Øt ƒë·∫ßu ch∆°i</button>
    </div>
  </section>
  <div class="snake-controls" aria-label="ƒêi·ªÅu khi·ªÉn r·∫Øn" data-game-i18n-aria="controlsSnake">
    <button class="up" type="button" data-dir="up">‚ñ≤</button>
    <button class="left" type="button" data-dir="left">‚óÄ</button>
    <button class="right" type="button" data-dir="right">‚ñ∂</button>
    <button class="down" type="button" data-dir="down">‚ñº</button>
  </div>
</main>
<script src="game-i18n.js"></script>
<script>
/*
  ANIME SNAKE - FILE ƒê·ªòC L·∫¨P
  C·∫•p 1: tƒÉng t·ªëc
  C·∫•p 2: l·ª≠a
  C·∫•p 3: b√Ýn tay xu·∫•t hi·ªán tr∆∞·ªõc ƒë·∫ßu r·∫Øn 7 √¥
  C·∫•p 4: v·∫≠t c·∫£n di chuy·ªÉn
  C·∫•p 5: t·ªïng h·ª£p l·ª≠a + b√Ýn tay + v·∫≠t c·∫£n
*/
const cv=document.getElementById("game"),ctx=cv.getContext("2d"),$=id=>document.getElementById(id);
const scoreEl=$("score"),timeEl=$("time"),levelEl=$("level"),petals=$("petals"),overlay=$("overlay"),msgTitle=$("msgTitle"),msgText=$("msgText"),startBtn=$("startBtn"),soundBtn=$("soundBtn");
const gameLang=new URLSearchParams(location.search).get("lang")||"vi";
function backToGameMenu(){location.href="../index.html?lang="+encodeURIComponent(gameLang)}
$("backBtn").onclick=e=>{e.stopPropagation();backToGameMenu()};
document.addEventListener("keydown",e=>{if(e.key==="Escape")backToGameMenu()});
const CELL=20,N=cv.width/CELL,START_SPEED=200,MAX_SPEED=130,LV={2:10,3:18,4:26,5:35};
const DIR={up:[0,-1],down:[0,1],left:[-1,0],right:[1,0]};
let snake,food,dir,nextDir,score,level,speed,loop,fires,hands,blocks,tick,startedAt,seconds,glow,lastHandTick,lastFireLen,lastBlockLen,levelNotice,playing=false;
const LOW_FX=matchMedia("(hover:none),(max-width:900px),(prefers-reduced-motion:reduce)").matches;

/* √Çm thanh t·∫°o b·∫±ng Web Audio API, kh√¥ng c·∫ßn file mp3 ngo√Ýi */
let audioCtx=null,soundOn=true;
function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();if(audioCtx.state==="suspended")audioCtx.resume()}
function tone(f=440,d=.08,type="sine",v=.08){if(!soundOn||!audioCtx)return;let t=audioCtx.currentTime,o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type=type;o.frequency.setValueAtTime(f,t);g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(v,t+.01);g.gain.exponentialRampToValueAtTime(.001,t+d);o.connect(g);g.connect(audioCtx.destination);o.start(t);o.stop(t+d+.02)}
function sound(n){if(n==="eat"){tone(720,.07,"triangle",.09);setTimeout(()=>tone(980,.06,"triangle",.07),55)}if(n==="turn")tone(360,.035,"square",.035);if(n==="level"){tone(520,.08);setTimeout(()=>tone(760,.09),80);setTimeout(()=>tone(1040,.12),170)}if(n==="gameover"){tone(240,.18,"sawtooth",.09);setTimeout(()=>tone(160,.25,"sawtooth",.08),170)}}

/* H√Ým ti·ªán √≠ch */
const rnd=n=>Math.floor(Math.random()*n),same=(a,b)=>a.x===b.x&&a.y===b.y,wrap=p=>({x:(p.x+N)%N,y:(p.y+N)%N});
const fmt=s=>String(Math.floor(s/60)).padStart(2,"0")+":"+String(s%60).padStart(2,"0");
function free(p){return p.x>=0&&p.x<N&&p.y>=0&&p.y<N&&!snake.some(same.bind(null,p))&&(!food||!same(p,food))&&!fires.some(same.bind(null,p))&&!hands.some(same.bind(null,p))&&!blocks.some(same.bind(null,p))}
function emptyCell(){for(let i=0;i<1000;i++){let p={x:rnd(N),y:rnd(N)};if(free(p))return p}return{x:1,y:1}}
function levelByLen(){return snake.length>=LV[5]?5:snake.length>=LV[4]?4:snake.length>=LV[3]?3:snake.length>=LV[2]?2:1}
function levelName(l){return gt('level'+l)}

/* C√°nh hoa: kh√¥ng x√≥a khi tƒÉng s·ªë l∆∞·ª£ng ƒë·ªÉ tr√°nh kh·ª±ng animation */
function addPetals(count,power=0,clear=false){if(clear)petals.innerHTML="";if(LOW_FX)return;for(let i=0;i<count;i++){let e=document.createElement("span"),dur=Math.max(1.5,6.4-power*.15)+Math.random()*4;e.className="petal"+(power>12?" fast":"");e.style.left=Math.random()*100+"vw";e.style.animationDuration=dur+"s";e.style.animationDelay=-(Math.random()*dur)+"s";e.style.setProperty("--s",.55+Math.random()*1.2);e.style.setProperty("--o",Math.min(1,.42+power*.012+Math.random()*.45));e.style.setProperty("--d",(Math.random()>.5?1:-1)*(45+Math.random()*(85+power*2))+"px");petals.appendChild(e)}}
function atmosphere(){if(LOW_FX){glow=0;return}let p=Math.max(0,snake.length-3),target=Math.min(130,28+p*4);glow=Math.min(1,p/30);document.documentElement.style.setProperty("--glow",glow.toFixed(2));if(petals.children.length<target)addPetals(target-petals.children.length,p,false)}

function reset(){snake=[{x:10,y:10},{x:9,y:10},{x:8,y:10}];dir=nextDir={x:1,y:0};score=0;level=1;speed=START_SPEED;tick=0;seconds=0;glow=0;fires=[];hands=[];blocks=[];lastHandTick=0;lastFireLen=0;lastBlockLen=0;levelNotice=0;scoreEl.textContent="0";levelEl.textContent="1";timeEl.textContent="00:00";document.documentElement.style.setProperty("--glow",0);addPetals(28,0,true);food=emptyCell();draw()}
function start(){initAudio();reset();playing=true;startedAt=Date.now();overlay.classList.add("hide");clearInterval(loop);loop=setInterval(update,speed)}

function enterLevel(l){level=l;levelEl.textContent=level;levelNotice=28;sound("level");fires=[];hands=[];blocks=[];lastFireLen=lastBlockLen=snake.length;lastHandTick=tick-7;if(level===2)addFire(6);if(level===4)addBlock(3);if(level===5){addFire(8);addBlock(3)}}
function updateLevel(){let nl=levelByLen();if(nl!==level){enterLevel(nl);return}if((level===2||level===5)&&snake.length-lastFireLen>=4){addFire(1);lastFireLen=snake.length}if((level===4||level===5)&&snake.length-lastBlockLen>=7){addBlock(1);lastBlockLen=snake.length}}
function addFire(n){for(let i=0;i<n;i++)fires.push(emptyCell())}
function addBlock(n){let ds=[[1,0],[-1,0],[0,1],[0,-1]];for(let i=0;i<n;i++){let p=emptyCell(),d=ds[rnd(ds.length)];blocks.push({...p,dx:d[0],dy:d[1],moveEvery:level===5?2:3,pulse:Math.random()*100})}}
function updateHazards(){
  if(level===3||level===5){
    hands=hands.map(h=>({...h,life:h.life-1})).filter(h=>h.life>0);
    if(tick-lastHandTick>=(level===5?10:14)){let h=snake[0],p=wrap({x:h.x+dir.x*7,y:h.y+dir.y*7});if(free(p))hands.push({...p,life:level===5?9:11,max:level===5?9:11,dx:dir.x,dy:dir.y});lastHandTick=tick}
  }
  if(level===4||level===5)blocks.forEach(b=>{if(tick%b.moveEvery)return;let p={x:b.x+b.dx,y:b.y+b.dy};if(!canBlock(p,b)){b.dx*=-1;b.dy*=-1;p={x:b.x+b.dx,y:b.y+b.dy}}if(canBlock(p,b)){b.x=p.x;b.y=p.y}})
}
function canBlock(p,b){return p.x>=0&&p.x<N&&p.y>=0&&p.y<N&&!snake.some(same.bind(null,p))&&!fires.some(same.bind(null,p))&&!hands.some(same.bind(null,p))&&!blocks.some(o=>o!==b&&same(p,o))&&(!food||!same(p,food))}

function update(){tick++;seconds=Math.floor((Date.now()-startedAt)/1000);timeEl.textContent=fmt(seconds);updateHazards();dir=nextDir;let head=wrap({x:snake[0].x+dir.x,y:snake[0].y+dir.y});if(dead(head))return gameOver();snake.unshift(head);if(same(head,food)){sound("eat");score++;scoreEl.textContent=score;speedGlow();updateLevel();food=emptyCell()}else snake.pop();if(levelNotice>0)levelNotice--;draw()}
function dead(h){return snake.some(same.bind(null,h))||fires.some(same.bind(null,h))||hands.some(same.bind(null,h))||blocks.some(same.bind(null,h))}
function speedGlow(){let lv1=Math.min(snake.length,LV[2])-3,newSpeed=Math.max(MAX_SPEED,START_SPEED-lv1*12);atmosphere();if(newSpeed!==speed){speed=newSpeed;clearInterval(loop);loop=setInterval(update,speed)}}
function gameOver(){sound("gameover");playing=false;clearInterval(loop);msgTitle.textContent=gt("gameOver");msgText.textContent=gt("over",{score,time:fmt(seconds)});startBtn.textContent=gt("retry");overlay.classList.remove("hide")}

/* V·∫Ω game */
function draw(){bg();fires.forEach(drawFire);hands.forEach(drawHand);blocks.forEach(drawBlock);drawFood();drawSnake();drawSpeedLines();drawNotice()}
function bg(){ctx.clearRect(0,0,cv.width,cv.height);let g=ctx.createLinearGradient(0,0,cv.width,cv.height);g.addColorStop(0,"#070820");g.addColorStop(.55,"#14103c");g.addColorStop(1,"#050716");ctx.fillStyle=g;ctx.fillRect(0,0,cv.width,cv.height);if(LOW_FX)return;ctx.strokeStyle=`rgba(255,255,255,${.045+glow*.045})`;for(let i=0;i<=N;i++){ctx.beginPath();ctx.moveTo(i*CELL,0);ctx.lineTo(i*CELL,cv.height);ctx.stroke();ctx.beginPath();ctx.moveTo(0,i*CELL);ctx.lineTo(cv.width,i*CELL);ctx.stroke()}ctx.save();ctx.globalAlpha=.12+glow*.12;ctx.fillStyle="#ff73d1";ctx.font="bold 72px Segoe UI";ctx.fillText("Ê°ú",30,92);ctx.fillText("Â§¢",cv.width-112,cv.height-38);ctx.restore()}
function drawSnake(){snake.forEach((p,i)=>{let x=p.x*CELL,y=p.y*CELL,head=i===0;ctx.shadowColor=head?"#ff5fcc":"#69d7ff";ctx.shadowBlur=LOW_FX?0:(head?18:10)+snake.length*.9;round(x+2,y+2,CELL-4,CELL-4,head?8:7,head?"#ff62c8":"#7b6cff");ctx.shadowBlur=0;if(head)eyes(x,y)})}
function drawFood(){let x=food.x*CELL+10,y=food.y*CELL+10;ctx.save();ctx.shadowColor="#ffeb75";ctx.shadowBlur=LOW_FX?0:24;ctx.fillStyle="#fff06a";star(x,y,5,10,4);ctx.fill();ctx.restore()}
function drawFire(f,i){let x=f.x*CELL+10,y=f.y*CELL+10,p=LOW_FX?0:Math.sin(Date.now()/150+i)*2;ctx.save();ctx.shadowColor="#ff4b18";ctx.shadowBlur=LOW_FX?0:20;ctx.fillStyle="#ff7a1c";ctx.beginPath();ctx.arc(x,y,13+p,0,Math.PI*2);ctx.fill();ctx.fillStyle="#ffdd55";ctx.beginPath();ctx.moveTo(x,y-11-p);ctx.bezierCurveTo(x+10,y-3,x+6,y+10,x,y+11);ctx.bezierCurveTo(x-9,y+7,x-7,y-3,x,y-11-p);ctx.fill();ctx.restore()}
function drawHand(h){let x=h.x*CELL+10,y=h.y*CELL+10,a=Math.atan2(h.dy,h.dx);ctx.save();ctx.translate(x,y);ctx.rotate(a);ctx.globalAlpha=.7+h.life/h.max*.3;ctx.shadowColor="#bf5cff";ctx.shadowBlur=LOW_FX?0:18;ctx.fillStyle="#ffc7ef";roundLocal(-5,-7,16,14,6);ctx.fillStyle="#ff96df";roundLocal(4,-13,6,9,3);roundLocal(10,-9,6,9,3);roundLocal(10,0,6,9,3);roundLocal(4,5,6,9,3);ctx.restore()}
function drawBlock(b,i){let x=b.x*CELL+10,y=b.y*CELL+10,p=LOW_FX?0:Math.sin(Date.now()/130+b.pulse+i)*2;ctx.save();ctx.translate(x,y);ctx.rotate(LOW_FX?0:Date.now()/500+i);ctx.shadowColor="#54e6ff";ctx.shadowBlur=LOW_FX?0:16;ctx.fillStyle="#4de7ff";ctx.beginPath();ctx.moveTo(0,-11-p);ctx.lineTo(11+p,0);ctx.lineTo(0,11+p);ctx.lineTo(-11-p,0);ctx.closePath();ctx.fill();ctx.restore()}
function drawSpeedLines(){if(LOW_FX||glow<=.05)return;ctx.save();ctx.globalAlpha=.1+glow*.16;ctx.strokeStyle="#fff";ctx.shadowColor="#7bdfff";ctx.shadowBlur=12;for(let i=0;i<8+glow*24;i++){let x=Math.random()*cv.width,y=Math.random()*cv.height,l=25+glow*70;ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x-dir.x*l-8,y-dir.y*l-8);ctx.stroke()}ctx.restore()}
function drawNotice(){if(level===1)return;ctx.save();ctx.font="bold 18px Segoe UI";ctx.shadowBlur=12;ctx.shadowColor=level===2?"#ff4b18":level===3?"#bf5cff":"#54e6ff";ctx.fillStyle=levelNotice>0?"#ffe66d":"rgba(255,230,109,.75)";ctx.fillText(levelNotice>0?levelName(level):`${gt("levelPrefix")} ${level}`,16,14);ctx.restore()}
function round(x,y,w,h,r,c){ctx.fillStyle=c;ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.fill()}
function roundLocal(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.fill()}
function eyes(x,y){ctx.fillStyle="#fff";ctx.beginPath();ctx.arc(x+6,y+7,3,0,Math.PI*2);ctx.arc(x+14,y+7,3,0,Math.PI*2);ctx.fill();ctx.fillStyle="#241647";ctx.beginPath();ctx.arc(x+6,y+7.5,1.5,0,Math.PI*2);ctx.arc(x+14,y+7.5,1.5,0,Math.PI*2);ctx.fill()}
function star(cx,cy,sp,or,ir){let rot=Math.PI/2*3,step=Math.PI/sp;ctx.beginPath();ctx.moveTo(cx,cy-or);for(let i=0;i<sp;i++){ctx.lineTo(cx+Math.cos(rot)*or,cy+Math.sin(rot)*or);rot+=step;ctx.lineTo(cx+Math.cos(rot)*ir,cy+Math.sin(rot)*ir);rot+=step}ctx.closePath()}

function turn(name){if(!playing)return;let[x,y]=DIR[name];if(x+dir.x!==0||y+dir.y!==0){nextDir={x,y};sound("turn")}}
document.addEventListener("keydown",e=>{let m={ArrowUp:"up",w:"up",W:"up",ArrowDown:"down",s:"down",S:"down",ArrowLeft:"left",a:"left",A:"left",ArrowRight:"right",d:"right",D:"right"};if(m[e.key]){e.preventDefault();turn(m[e.key])}});
let touchStart=null;
function dirFromPoint(clientX,clientY){let r=cv.getBoundingClientRect(),cx=r.left+r.width/2,cy=r.top+r.height/2,dx=clientX-cx,dy=clientY-cy;return Math.abs(dx)>Math.abs(dy)?(dx>0?"right":"left"):(dy>0?"down":"up")}
document.addEventListener("pointerdown",e=>{if(e.target.closest&&e.target.closest(".snake-controls"))return;if(e.target===soundBtn||e.target===startBtn||e.target.id==="backBtn")return;if(!playing)return;e.preventDefault();touchStart={x:e.clientX,y:e.clientY}},{passive:false});
document.addEventListener("pointerup",e=>{if(!playing||!touchStart)return;e.preventDefault();let dx=e.clientX-touchStart.x,dy=e.clientY-touchStart.y,adx=Math.abs(dx),ady=Math.abs(dy);if(Math.max(adx,ady)>18)turn(adx>ady?(dx>0?"right":"left"):(dy>0?"down":"up"));else turn(dirFromPoint(e.clientX,e.clientY));touchStart=null},{passive:false});
document.querySelectorAll(".snake-controls button").forEach(btn=>btn.addEventListener("pointerdown",e=>{e.preventDefault();e.stopPropagation();turn(btn.dataset.dir)},{passive:false}));
soundBtn.addEventListener("pointerdown",e=>e.stopPropagation());
soundBtn.onclick=e=>{e.stopPropagation();initAudio();soundOn=!soundOn;soundBtn.textContent=soundOn?"üîä":"üîá";if(soundOn)sound("level")};
startBtn.onclick=start;
reset();
