<!DOCTYPE html>
<html lang="vi" data-game="bird">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Anime Bird Test</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--glow:0}
html,body{width:100%;min-height:100%}
body{
  min-height:100dvh;overflow:auto;color:#fff;font-family:"Segoe UI",Arial,sans-serif;
  display:flex;justify-content:center;align-items:flex-start;padding:0;
  background:
    radial-gradient(circle at 15% 20%,rgba(255,126,199,.55),transparent 28%),
    radial-gradient(circle at 85% 15%,rgba(115,190,255,.5),transparent 30%),
    linear-gradient(135deg,#120024,#1b0647 48%,#050919);
}
body:before{
  content:"";position:fixed;inset:-20%;z-index:0;pointer-events:none;filter:blur(8px);
  background:radial-gradient(circle,rgba(255,80,190,calc(.08 + var(--glow)*.18)),transparent 30%);
  animation:pulse 3s ease-in-out infinite;
}
@keyframes pulse{50%{transform:scale(1.06) rotate(2deg);opacity:1}}
#petals{position:fixed;inset:0;z-index:1;overflow:hidden;pointer-events:none}
.petal{position:absolute;top:-48px;width:16px;height:10px;border-radius:70% 20% 70% 20%;background:rgba(255,179,221,.9);filter:drop-shadow(0 0 8px rgba(255,165,220,.8));animation:fall linear infinite}
@keyframes fall{
  0%{transform:translateY(-70px) rotate(0) translateX(0) scale(var(--s,1));opacity:0}
  10%{opacity:var(--o,.8)}
  100%{transform:translateY(115vh) rotate(860deg) translateX(var(--d,80px)) scale(var(--s,1));opacity:0}
}
.box{
  position:relative;z-index:2;width:min(100vw,760px);margin:0 auto;padding:clamp(8px,1.6vw,14px);
  border:1px solid rgba(255,255,255,.18);border-radius:20px;background:rgba(11,8,36,.72);
  backdrop-filter:blur(16px);
  box-shadow:0 0 calc(35px + var(--glow)*30px) rgba(255,79,190,.34),0 0 calc(75px + var(--glow)*55px) rgba(82,170,255,.22),inset 0 0 26px rgba(255,255,255,.06);
}
.top{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;margin-bottom:8px}
.title{display:flex;align-items:center;gap:8px}
h1{font-size:clamp(22px,4vw,34px);white-space:nowrap;text-shadow:0 0 14px rgba(255,107,205,.85)}
.sound{width:38px;height:38px;padding:0;border-radius:50%;font-size:18px;background:rgba(255,255,255,.13);border:1px solid rgba(255,255,255,.2)}
.stats{display:grid;grid-template-columns:repeat(3,minmax(74px,1fr));gap:8px}
.card{min-width:74px;padding:8px;border-radius:18px;text-align:center;background:linear-gradient(135deg,rgba(255,78,183,.22),rgba(64,174,255,.18));border:1px solid rgba(255,255,255,.18)}
.card span{display:block;font-size:12px;color:#d8dcff}.card b{font-size:clamp(20px,3.5vw,26px);text-shadow:0 0 12px rgba(91,201,255,.9)}
.board{--bs:min(100%,720px,calc(100dvh - 112px));position:relative;width:var(--bs);margin:auto;padding:6px;border-radius:20px;background:linear-gradient(135deg,rgba(255,99,197,.5),rgba(89,188,255,.42))}
canvas{display:block;width:100%;height:auto;aspect-ratio:1/1;border-radius:16px;background:#09091d;touch-action:none;box-shadow:inset 0 0 26px rgba(91,201,255,.18)}
.overlay{position:absolute;inset:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:22px;border-radius:18px;background:rgba(5,6,22,.76);backdrop-filter:blur(6px)}
.overlay.hide{display:none}.overlay h2{font-size:30px;margin-bottom:8px}.overlay p{max-width:380px;line-height:1.5;margin-bottom:16px;color:#e7e8ff}
.face{width:86px;height:86px;margin-bottom:10px;border-radius:50%;border:3px solid #fff;box-shadow:0 0 25px rgba(255,118,211,.85);background:radial-gradient(circle at 35% 40%,#fff 0 5px,#2a194a 6px 9px,transparent 10px),radial-gradient(circle at 65% 40%,#fff 0 5px,#2a194a 6px 9px,transparent 10px),radial-gradient(circle at 50% 70%,#ff73c7 0 5px,transparent 6px),linear-gradient(135deg,#ffd7ee,#ffc0e7 45%,#fff4fb)}
button{border:0;padding:12px 22px;border-radius:999px;color:#fff;font-weight:700;cursor:pointer;background:linear-gradient(135deg,#ff4fbb,#7b5cff,#39c6ff);box-shadow:0 0 18px rgba(255,79,187,.55)}
@media(max-width:560px){.top{grid-template-columns:1fr}.stats{grid-template-columns:repeat(3,1fr)}.card{min-width:0;padding:8px 6px}.card span{font-size:11px}}
@media(max-height:660px){.board{--bs:min(100%,720px,calc(100dvh - 96px))}}
body{overflow:hidden;align-items:stretch}
.box{width:min(100vw,860px);min-height:100dvh;padding:6px;border:0;border-radius:0;background:rgba(11,8,36,.64)}
.top{grid-template-columns:minmax(0,1fr) auto;gap:5px;margin-bottom:4px}
.title{gap:5px;min-width:0}
h1{font-size:clamp(14px,4vw,20px);overflow:hidden;text-overflow:ellipsis}
.back,.sound{width:30px;height:30px;padding:0;border-radius:50%;font-size:15px;background:rgba(255,255,255,.13);border:1px solid rgba(255,255,255,.2)}
.stats{grid-template-columns:repeat(3,minmax(48px,1fr));gap:4px}
.card{min-width:0;padding:4px 5px;border-radius:10px}
.card span{font-size:9px}.card b{font-size:clamp(14px,4vw,18px)}
.board{--bs:min(calc(100vw - 8px),calc(100dvh - 48px));padding:3px;border-radius:10px}
canvas{border-radius:8px}
.overlay{inset:5px;padding:14px;border-radius:10px}
.overlay h2{font-size:22px}.overlay p{font-size:13px;margin-bottom:12px}.face{width:56px;height:56px}
@media (hover:none),(max-width:900px),(prefers-reduced-motion:reduce){
  body:before,#petals{display:none}
  .box,.overlay{backdrop-filter:none;box-shadow:none}
  canvas,.card,h1,button,.face{box-shadow:none;text-shadow:none}
}
</style>
</head>
<body>
<div id="petals"></div>
<main class="box">
  <div class="top">
    <div class="title">
      <button id="backBtn" class="back" type="button" title="Quay lại danh sách game" data-game-i18n-title="backTitle">‹</button>
      <h1 data-game-i18n="title">Anime Bird</h1>
      <button id="soundBtn" class="sound" type="button">🔊</button>
    </div>
    <div class="stats">
      <div class="card"><span data-game-i18n="score">Điểm</span><b id="score">0</b></div>
      <div class="card"><span data-game-i18n="time">Thời gian</span><b id="time">00:00</b></div>
      <div class="card"><span data-game-i18n="level">Cấp</span><b id="level">1</b></div>
    </div>
  </div>
  <section class="board">
    <canvas id="game" width="480" height="480"></canvas>
    <div class="overlay" id="overlay">
      <div class="face"></div>
      <h2 id="msgTitle" data-game-i18n="ready">Sẵn sàng?</h2>
      <p id="msgText" data-game-i18n="intro">Chạm màn hình để bay lên. Bay qua khe cột để ghi điểm.</p>
      <button id="startBtn" data-game-i18n="start">Bắt đầu chơi</button>
    </div>
  </section>
</main>
<script src="game-i18n.js"></script>
<script>
const cv=document.getElementById("game"),ctx=cv.getContext("2d"),$=id=>document.getElementById(id);
const scoreEl=$("score"),timeEl=$("time"),levelEl=$("level"),petals=$("petals"),overlay=$("overlay"),msgTitle=$("msgTitle"),msgText=$("msgText"),startBtn=$("startBtn"),soundBtn=$("soundBtn");
const gameLang=new URLSearchParams(location.search).get("lang")||"vi";
function backToGameMenu(){location.href="../index.html?lang="+encodeURIComponent(gameLang)}
$("backBtn").onclick=e=>{e.stopPropagation();backToGameMenu()};
document.addEventListener("keydown",e=>{if(e.key==="Escape")backToGameMenu()});
const W=cv.width,H=cv.height,BIRD_X=135,GRAVITY=.32,FLAP=-6.4,PIPE_W=64,PIPE_GAP_START=195,PIPE_GAP_MIN=140,PIPE_DISTANCE=245;
let bird,pipes,score,level,seconds,startedAt,playing=false,loop,glow,speed,gap;
const LOW_FX=matchMedia("(hover:none),(max-width:900px),(prefers-reduced-motion:reduce)").matches;
let audioCtx=null,soundOn=true;

function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();if(audioCtx.state==="suspended")audioCtx.resume()}
function tone(f=440,d=.08,type="sine",v=.08){if(!soundOn||!audioCtx)return;let t=audioCtx.currentTime,o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type=type;o.frequency.setValueAtTime(f,t);g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(v,t+.01);g.gain.exponentialRampToValueAtTime(.001,t+d);o.connect(g);g.connect(audioCtx.destination);o.start(t);o.stop(t+d+.02)}
function sound(n){if(n==="flap")tone(520,.04,"triangle",.055);if(n==="score"){tone(760,.06,"triangle",.08);setTimeout(()=>tone(1020,.08,"triangle",.06),60)}if(n==="level"){tone(560,.08);setTimeout(()=>tone(860,.09),90)}if(n==="dead"){tone(220,.18,"sawtooth",.08);setTimeout(()=>tone(150,.22,"sawtooth",.07),150)}}

function addPetals(count,power=0,clear=false){if(clear)petals.innerHTML="";if(LOW_FX)return;for(let i=0;i<count;i++){let e=document.createElement("span"),dur=Math.max(1.4,6.2-power*.18)+Math.random()*4;e.className="petal";e.style.left=Math.random()*100+"vw";e.style.animationDuration=dur+"s";e.style.animationDelay=-(Math.random()*dur)+"s";e.style.setProperty("--s",.55+Math.random()*1.2);e.style.setProperty("--o",Math.min(1,.42+power*.015+Math.random()*.45));e.style.setProperty("--d",(Math.random()>.5?1:-1)*(45+Math.random()*(90+power*2))+"px");petals.appendChild(e)}}
function atmosphere(){if(LOW_FX){glow=0;return}let power=Math.max(0,score),target=Math.min(130,30+power*4);glow=Math.min(1,power/24);document.documentElement.style.setProperty("--glow",glow.toFixed(2));if(petals.children.length<target)addPetals(target-petals.children.length,power,false)}
function fmt(s){return String(Math.floor(s/60)).padStart(2,"0")+":"+String(s%60).padStart(2,"0")}

function reset(){
  bird={x:BIRD_X,y:H/2,vy:0,r:16,rot:0};
  pipes=[];score=0;level=1;seconds=0;glow=0;speed=1.85;gap=PIPE_GAP_START;
  scoreEl.textContent="0";levelEl.textContent="1";timeEl.textContent="00:00";
  document.documentElement.style.setProperty("--glow",0);addPetals(30,0,true);
  for(let i=0;i<3;i++)addPipe(W+120+i*PIPE_DISTANCE);
  draw();
}
function start(){initAudio();reset();playing=true;startedAt=Date.now();overlay.classList.add("hide");cancelAnimationFrame(loop);update()}

function addPipe(x){let margin=70,top=margin+Math.random()*(H-gap-margin*2);pipes.push({x,top,gap,passed:false})}
function difficulty(){
  let nl=Math.min(5,Math.floor(score/5)+1);
  if(nl!==level){level=nl;levelEl.textContent=level;sound("level")}
  speed=1.85+score*.045;
  gap=Math.max(PIPE_GAP_MIN,PIPE_GAP_START-score*1.35);
  atmosphere();
}
function update(){
  if(!playing)return;
  seconds=Math.floor((Date.now()-startedAt)/1000);timeEl.textContent=fmt(seconds);
  bird.vy+=GRAVITY;bird.y+=bird.vy;bird.rot=Math.max(-.55,Math.min(.85,bird.vy*.08));
  pipes.forEach(p=>p.x-=speed);
  if(pipes.length&&pipes[0].x+PIPE_W<0)pipes.shift();
  if(pipes[pipes.length-1].x<W+80)addPipe(pipes[pipes.length-1].x+PIPE_DISTANCE);
  pipes.forEach(p=>{if(!p.passed&&p.x+PIPE_W<bird.x){p.passed=true;score++;scoreEl.textContent=score;sound("score");difficulty()}});
  if(hit())return gameOver();
  draw();loop=requestAnimationFrame(update);
}
function flap(){if(!playing)return;bird.vy=FLAP;sound("flap")}
function hit(){if(bird.y-bird.r<0||bird.y+bird.r>H)return true;return pipes.some(p=>{let inX=bird.x+bird.r>p.x&&bird.x-bird.r<p.x+PIPE_W;let inY=bird.y-bird.r<p.top||bird.y+bird.r>p.top+p.gap;return inX&&inY})}
function gameOver(){playing=false;cancelAnimationFrame(loop);sound("dead");msgTitle.textContent=gt("gameOver");msgText.textContent=gt("over",{score,time:fmt(seconds)});startBtn.textContent=gt("retry");overlay.classList.remove("hide")}

function draw(){bg();pipes.forEach(drawPipe);drawBird();speedLines()}
function bg(){ctx.clearRect(0,0,W,H);let g=ctx.createLinearGradient(0,0,W,H);g.addColorStop(0,"#070820");g.addColorStop(.55,"#14103c");g.addColorStop(1,"#050716");ctx.fillStyle=g;ctx.fillRect(0,0,W,H);if(LOW_FX)return;ctx.strokeStyle=`rgba(255,255,255,${.04+glow*.05})`;for(let i=0;i<=24;i++){ctx.beginPath();ctx.moveTo(i*20,0);ctx.lineTo(i*20,H);ctx.stroke();ctx.beginPath();ctx.moveTo(0,i*20);ctx.lineTo(W,i*20);ctx.stroke()}ctx.save();ctx.globalAlpha=.12+glow*.12;ctx.fillStyle="#ff73d1";ctx.font="bold 72px Segoe UI";ctx.fillText("空",30,92);ctx.fillText("夢",W-112,H-38);ctx.restore()}
function drawPipe(p){let x=p.x,w=PIPE_W,top=p.top,bottom=p.top+p.gap;pipeRect(x,0,w,top,"#49e8ff","#7b5cff");pipeRect(x,bottom,w,H-bottom,"#ff6bd5","#7b5cff");ctx.save();ctx.shadowColor="#fff";ctx.shadowBlur=LOW_FX?0:10;ctx.fillStyle="rgba(255,255,255,.72)";ctx.fillRect(x-4,top-8,w+8,8);ctx.fillRect(x-4,bottom,w+8,8);ctx.restore()}
function pipeRect(x,y,w,h,c1,c2){let g=ctx.createLinearGradient(x,y,x+w,y+h);g.addColorStop(0,c1);g.addColorStop(1,c2);ctx.save();ctx.shadowColor=c1;ctx.shadowBlur=LOW_FX?0:16;round(x,y,w,h,12,g);ctx.restore()}
function drawBird(){ctx.save();ctx.translate(bird.x,bird.y);ctx.rotate(bird.rot);ctx.shadowColor="#ff5fcc";ctx.shadowBlur=LOW_FX?0:22;let body=ctx.createRadialGradient(-5,-6,3,0,0,24);body.addColorStop(0,"#fff");body.addColorStop(.45,"#ff73d1");body.addColorStop(1,"#5ccfff");ctx.fillStyle=body;ctx.beginPath();ctx.arc(0,0,18,0,Math.PI*2);ctx.fill();ctx.fillStyle="#ffd6f4";ctx.beginPath();ctx.ellipse(-10,5,11,6,-.5,0,Math.PI*2);ctx.fill();ctx.fillStyle="#ffeb75";ctx.beginPath();ctx.moveTo(16,-2);ctx.lineTo(30,4);ctx.lineTo(16,10);ctx.closePath();ctx.fill();ctx.fillStyle="#fff";ctx.beginPath();ctx.arc(5,-7,5,0,Math.PI*2);ctx.fill();ctx.fillStyle="#251744";ctx.beginPath();ctx.arc(6,-7,2,0,Math.PI*2);ctx.fill();ctx.restore()}
function speedLines(){if(LOW_FX||glow<=.05)return;ctx.save();ctx.globalAlpha=.1+glow*.18;ctx.strokeStyle="#fff";ctx.shadowColor="#7bdfff";ctx.shadowBlur=12;for(let i=0;i<8+glow*24;i++){let x=Math.random()*W,y=Math.random()*H,l=25+glow*70;ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x-l,y);ctx.stroke()}ctx.restore()}
function round(x,y,w,h,r,fill){ctx.fillStyle=fill;ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.fill()}

document.addEventListener("pointerdown",e=>{if(e.target===soundBtn||e.target===startBtn||e.target.id==="backBtn")return;e.preventDefault();flap()},{passive:false});
document.addEventListener("keydown",e=>{if(e.code==="Space"||e.key==="ArrowUp"){e.preventDefault();flap()}});
soundBtn.addEventListener("pointerdown",e=>e.stopPropagation());
soundBtn.onclick=e=>{e.stopPropagation();initAudio();soundOn=!soundOn;soundBtn.textContent=soundOn?"🔊":"🔇";if(soundOn)sound("level")};
startBtn.onclick=start;
reset();
</script>
</body>
</html>
