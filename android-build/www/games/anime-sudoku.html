function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();if(audioCtx.state==='suspended')audioCtx.resume()}function tone(f=440,d=.08,type='sine',v=.08){if(!soundOn||!audioCtx)return;let t=audioCtx.currentTime,o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type=type;o.frequency.setValueAtTime(f,t);g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(v,t+.01);g.gain.exponentialRampToValueAtTime(.001,t+d);o.connect(g);g.connect(audioCtx.destination);o.start(t);o.stop(t+d+.02)}function sound(n){if(n==='tap')tone(420,.035,'square',.035);if(n==='num')tone(620,.045,'triangle',.055);if(n==='bad')tone(160,.12,'sawtooth',.08);if(n==='hint')tone(860,.08,'triangle',.07);if(n==='win'){tone(560,.08);setTimeout(()=>tone(820,.1),90);setTimeout(()=>tone(1120,.14),180)}}
function addPetals(count,power=0,clear=false){if(clear)petals.innerHTML='';for(let i=0;i<count;i++){const e=document.createElement('span'),dur=Math.max(1.4,6.2-power*.18)+Math.random()*4;e.className='petal';e.style.left=Math.random()*100+'vw';e.style.animationDuration=dur+'s';e.style.animationDelay=-(Math.random()*dur)+'s';e.style.setProperty('--s',.55+Math.random()*1.2);e.style.setProperty('--o',Math.min(1,.42+power*.015+Math.random()*.45));e.style.setProperty('--d',(Math.random()>.5?1:-1)*(45+Math.random()*(90+power*2))+'px');petals.appendChild(e)}}function updateGlow(){const filled=values.filter(Boolean).length,power=filled/10;document.documentElement.style.setProperty('--glow',Math.min(1,power/8).toFixed(2));if(petals.children.length<30+power*4)addPetals(2,power,false)}
function buildBoard(){boardEl.innerHTML='';for(let i=0;i<81;i++){const cell=document.createElement('div');cell.className='cell';cell.dataset.i=i;cell.onclick=()=>selectCell(i);boardEl.appendChild(cell)}}function buildNumpad(){numpadEl.innerHTML='';for(let n=1;n<=9;n++){const b=document.createElement('button');b.className='num-btn';b.textContent=n;b.onclick=()=>putNumber(n);numpadEl.appendChild(b)}}
function startGame(next=false){initAudio();if(next)puzzleIndex=(puzzleIndex+1)%PUZZLES.length;const data=PUZZLES[puzzleIndex];puzzle=data.puzzle;solution=data.solution;levelEl.textContent=tr(data.key||data.name);startBtn.dataset.next='0';values=puzzle.split('').map(ch=>ch==='0'?'':ch);givens=puzzle.split('').map(ch=>ch!=='0');notes=Array.from({length:81},()=>new Set());selected=values.findIndex(v=>!v);if(selected<0)selected=0;errors=0;checked=false;playing=true;noteMode=false;noteBtn.classList.remove('mode-on');errEl.textContent='0';overlay.classList.add('hide');addPetals(30,0,true);updateGlow();startTimer();render();sound('tap')}function startTimer(){clearInterval(timer);startTime=Date.now();timeEl.textContent='00:00';timer=setInterval(()=>{if(playing)timeEl.textContent=fmt(Math.floor((Date.now()-startTime)/1000))},1000)}function fmt(s){return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0')}function win(){playing=false;clearInterval(timer);sound('win');msgTitle.textContent=tr('complete');msgText.textContent=fmtMsg('win',{level:tr(PUZZLES[puzzleIndex].key||PUZZLES[puzzleIndex].name),time:timeEl.textContent});startBtn.textContent=tr('next');startBtn.dataset.next='1';overlay.classList.remove('hide')}
function selectCell(i){selected=i;sound('tap');render()}function putNumber(n){if(!playing||givens[selected])return;if(noteMode){if(notes[selected].has(n))notes[selected].delete(n);else notes[selected].add(n);sound('num');render();return}values[selected]=String(n);notes[selected].clear();sound('num');if(String(n)!==solution[selected]){errors++;errEl.textContent=errors;sound('bad')}checked=false;updateGlow();render();if(isSolved())win()}function erase(){if(!playing||givens[selected])return;values[selected]='';notes[selected].clear();checked=false;sound('tap');render()}function hint(){if(!playing||givens[selected])return;values[selected]=solution[selected];notes[selected].clear();sound('hint');updateGlow();render();if(isSolved())win()}function checkBoard(){checked=true;sound('tap');render()}function isSolved(){return values.every((v,i)=>v===solution[i])}
function row(i){return Math.floor(i/9)}function col(i){return i%9}function box(i){return Math.floor(row(i)/3)*3+Math.floor(col(i)/3)}function peers(a,b){return row(a)===row(b)||col(a)===col(b)||box(a)===box(b)}function hasConflict(i){if(!values[i])return false;for(let j=0;j<81;j++)if(i!==j&&values[j]===values[i]&&peers(i,j))return true;return false}
function render(){const cells=[...boardEl.children];cells.forEach((cell,i)=>{cell.className='cell';cell.innerHTML='';if(givens[i])cell.classList.add('given');if(i===selected)cell.classList.add('selected');else if(values[i]&&values[i]===values[selected])cell.classList.add('same');else if(peers(i,selected))cell.classList.add('peer');if(hasConflict(i))cell.classList.add('wrong');if(checked&&values[i]&&values[i]!==solution[i])cell.classList.add('wrong');if(checked&&values[i]&&values[i]===solution[i]&&!givens[i])cell.classList.add('correct');if(values[i])cell.textContent=values[i];else if(notes[i].size){const wrap=document.createElement('div');wrap.className='notes';for(let n=1;n<=9;n++){const s=document.createElement('span');s.textContent=notes[i].has(n)?n:'';wrap.appendChild(s)}cell.appendChild(wrap)}})}
noteBtn.onclick=()=>{noteMode=!noteMode;noteBtn.classList.toggle('mode-on',noteMode);sound('tap')};eraseBtn.onclick=erase;checkBtn.onclick=checkBoard;hintBtn.onclick=hint;newBtn.onclick=()=>startGame(true);startBtn.onclick=()=>startGame(startBtn.dataset.next==='1');soundBtn.onclick=e=>{e.stopPropagation();initAudio();soundOn=!soundOn;soundBtn.textContent=soundOn?'🔊':'🔇';if(soundOn)sound('hint')};document.addEventListener('keydown',e=>{if(!playing)return;if(e.key>='1'&&e.key<='9')putNumber(Number(e.key));if(e.key==='Backspace'||e.key==='Delete'||e.key==='0')erase();if(e.key==='ArrowLeft'){e.preventDefault();selectCell(Math.max(0,selected-1))}if(e.key==='ArrowRight'){e.preventDefault();selectCell(Math.min(80,selected+1))}if(e.key==='ArrowUp'){e.preventDefault();selectCell(Math.max(0,selected-9))}if(e.key==='ArrowDown'){e.preventDefault();selectCell(Math.min(80,selected+9))}if(e.key==='n'||e.key==='N'){noteMode=!noteMode;noteBtn.classList.toggle('mode-on',noteMode)}});
applySudokuI18n();levelEl.textContent=tr(PUZZLES[puzzleIndex].key);startBtn.dataset.next='0';buildBoard();buildNumpad();addPetals(30,0,true);
</script></body></html>
