<!DOCTYPE html>
<html lang="vi" data-game="tetris">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Anime Tetris Wide</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--glow:0}
html,body{width:100%;min-height:100%}
body{
  min-height:100dvh;padding:0;overflow:auto;color:#fff;
  display:flex;justify-content:center;align-items:flex-start;
  font-family:"Segoe UI",Arial,sans-serif;
  background:
    radial-gradient(circle at 15% 20%,rgba(255,126,199,.55),transparent 28%),
    radial-gradient(circle at 85% 15%,rgba(115,190,255,.5),transparent 30%),
    linear-gradient(135deg,#120024,#1b0647 48%,#050919);
}
body:before{
  content:"";position:fixed;inset:-20%;z-index:0;pointer-events:none;filter:blur(8px);
  background:radial-gradient(circle,rgba(255,80,190,calc(.08 + var(--glow)*.18)),transparent 30%);
  animation:pulse 3s ease-in-out infinite;
}
@keyframes pulse{50%{transform:scale(1.06) rotate(2deg);opacity:1}}

#petals{position:fixed;inset:0;z-index:1;overflow:hidden;pointer-events:none}
.petal{position:absolute;top:-48px;width:16px;height:10px;border-radius:70% 20% 70% 20%;background:rgba(255,179,221,.9);filter:drop-shadow(0 0 8px rgba(255,165,220,.8));animation:fall linear infinite}
@keyframes fall{
  0%{transform:translateY(-70px) rotate(0) translateX(0) scale(var(--s,1));opacity:0}
  10%{opacity:var(--o,.8)}
  100%{transform:translateY(115vh) rotate(860deg) translateX(var(--d,80px)) scale(var(--s,1));opacity:0}
}

.box{
  position:relative;z-index:2;width:min(100vw,860px);margin:0 auto;padding:clamp(8px,1.6vw,14px);
  border:1px solid rgba(255,255,255,.18);border-radius:20px;background:rgba(11,8,36,.72);
  backdrop-filter:blur(16px);
  box-shadow:0 0 calc(35px + var(--glow)*30px) rgba(255,79,190,.34),0 0 calc(75px + var(--glow)*55px) rgba(82,170,255,.22),inset 0 0 26px rgba(255,255,255,.06);
}
.top{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;margin-bottom:8px}
.title{display:flex;align-items:center;gap:8px}
h1{font-size:clamp(22px,4vw,34px);white-space:nowrap;text-shadow:0 0 14px rgba(255,107,205,.85)}
.sound{width:38px;height:38px;padding:0;border-radius:50%;font-size:18px;background:rgba(255,255,255,.13);border:1px solid rgba(255,255,255,.2)}
.stats{display:grid;grid-template-columns:repeat(3,minmax(74px,1fr));gap:8px}
.card{min-width:74px;padding:8px;border-radius:18px;text-align:center;background:linear-gradient(135deg,rgba(255,78,183,.22),rgba(64,174,255,.18));border:1px solid rgba(255,255,255,.18)}
.card span{display:block;font-size:12px;color:#d8dcff}
.card b{font-size:clamp(20px,3.5vw,26px);text-shadow:0 0 12px rgba(91,201,255,.9)}

.board{
  --bs:min(100%,820px,calc(100dvh - 110px));
  position:relative;width:var(--bs);margin:auto;padding:6px;border-radius:20px;
  background:linear-gradient(135deg,rgba(255,99,197,.5),rgba(89,188,255,.42));
}
canvas{
  display:block;width:100%;height:auto;aspect-ratio:31/43;border-radius:16px;
  background:#09091d;touch-action:none;box-shadow:inset 0 0 26px rgba(91,201,255,.18)
}
.overlay{
  position:absolute;inset:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:22px;border-radius:18px;background:rgba(5,6,22,.76);backdrop-filter:blur(6px)
}
.overlay.hide{display:none}
.overlay h2{font-size:30px;margin-bottom:8px}
.overlay p{max-width:390px;line-height:1.5;margin-bottom:16px;color:#e7e8ff}
.face{
  width:86px;height:86px;margin-bottom:10px;border-radius:50%;border:3px solid #fff;box-shadow:0 0 25px rgba(255,118,211,.85);
  background:
    radial-gradient(circle at 35% 40%,#fff 0 5px,#2a194a 6px 9px,transparent 10px),
    radial-gradient(circle at 65% 40%,#fff 0 5px,#2a194a 6px 9px,transparent 10px),
    radial-gradient(circle at 50% 70%,#ff73c7 0 5px,transparent 6px),
    linear-gradient(135deg,#ffd7ee,#ffc0e7 45%,#fff4fb)
}
button{border:0;padding:12px 22px;border-radius:999px;color:#fff;font-weight:700;cursor:pointer;background:linear-gradient(135deg,#ff4fbb,#7b5cff,#39c6ff);box-shadow:0 0 18px rgba(255,79,187,.55)}
@media(max-width:560px){.top{grid-template-columns:1fr}.stats{grid-template-columns:repeat(3,1fr)}.card{min-width:0;padding:8px 6px}.card span{font-size:11px}}
body{overflow:hidden;align-items:stretch}
.box{width:min(100vw,900px);min-height:100dvh;padding:6px;border:0;border-radius:0;background:rgba(11,8,36,.64)}
.top{grid-template-columns:minmax(0,1fr) auto;gap:5px;margin-bottom:4px}
.title{gap:5px;min-width:0}
h1{font-size:clamp(14px,4vw,20px);overflow:hidden;text-overflow:ellipsis}
.back,.sound{width:30px;height:30px;padding:0;border-radius:50%;font-size:15px;background:rgba(255,255,255,.13);border:1px solid rgba(255,255,255,.2)}
.stats{grid-template-columns:repeat(3,minmax(48px,1fr));gap:4px}
.card{min-width:0;padding:4px 5px;border-radius:10px}
.card span{font-size:9px}.card b{font-size:clamp(14px,4vw,18px)}
.board{--bs:min(calc(100vw - 8px),calc(100dvh - 48px));padding:3px;border-radius:10px}
canvas{border-radius:8px;aspect-ratio:3/5}
.overlay{inset:5px;padding:14px;border-radius:10px}
.overlay h2{font-size:22px}.overlay p{font-size:13px;margin-bottom:12px}.face{width:56px;height:56px}
@media (hover:none),(max-width:900px),(prefers-reduced-motion:reduce){
  body:before,#petals{display:none}
  .box,.overlay{backdrop-filter:none;box-shadow:none}
  canvas,.card,h1,button,.face{box-shadow:none;text-shadow:none}
}
</style>
</head>
<body>
<div id="petals"></div>
<main class="box">
  <div class="top">
    <div class="title"><button id="backBtn" class="back" type="button" title="Quay lại danh sách game" data-game-i18n-title="backTitle">‹</button><h1 data-game-i18n="title">Anime Tetris</h1><button id="soundBtn" class="sound" type="button" data-game-i18n-title="soundTitle">🔊</button></div>
    <div class="stats">
      <div class="card"><span data-game-i18n="score">Điểm</span><b id="score">0</b></div>
      <div class="card"><span data-game-i18n="lines">Dòng</span><b id="lines">0</b></div>
      <div class="card"><span data-game-i18n="level">Cấp</span><b id="level">1</b></div>
    </div>
  </div>
  <section class="board">
    <canvas id="game" width="420" height="700"></canvas>
    <div class="overlay" id="overlay">
      <div class="face"></div>
      <h2 id="msgTitle" data-game-i18n="ready">Sẵn sàng?</h2>
      <p id="msgText" data-game-i18n="intro">Xếp khối để lấp đầy dòng. Đủ dòng sẽ lên cấp và rơi nhanh hơn.</p>
      <button id="startBtn" data-game-i18n="start">Bắt đầu chơi</button>
    </div>
  </section>
</main>

<script src="game-i18n.js"></script>
<script>
const cv=document.getElementById("game"),ctx=cv.getContext("2d"),$=id=>document.getElementById(id);
const scoreEl=$("score"),linesEl=$("lines"),levelEl=$("level"),petals=$("petals"),overlay=$("overlay"),msgTitle=$("msgTitle"),msgText=$("msgText"),startBtn=$("startBtn"),soundBtn=$("soundBtn");
const gameLang=new URLSearchParams(location.search).get("lang")||"vi";
function backToGameMenu(){location.href="../index.html?lang="+encodeURIComponent(gameLang)}
$("backBtn").onclick=e=>{e.stopPropagation();backToGameMenu()};
document.addEventListener("keydown",e=>{if(e.key==="Escape")backToGameMenu()});

const W=cv.width,H=cv.height;
const COLS=10,ROWS=20,CELL=30;
const PX=18,PY=48;
const NEXT_X=330,NEXT_Y=108;

const COLORS={I:"#54e6ff",O:"#fff06a",T:"#bf5cff",S:"#5dff9c",Z:"#ff4b77",J:"#4f7cff",L:"#ff9d3d"};
const SHAPES={
  I:[[1,1,1,1]],
  O:[[1,1],[1,1]],
  T:[[0,1,0],[1,1,1]],
  S:[[0,1,1],[1,1,0]],
  Z:[[1,1,0],[0,1,1]],
  J:[[1,0,0],[1,1,1]],
  L:[[0,0,1],[1,1,1]]
};
const TYPES=Object.keys(SHAPES);

let board,piece,nextPiece,score,lines,level,playing=false,loop,lastTime,dropTimer,dropInterval,glow;
let touchStart=null;
const LOW_FX=matchMedia("(hover:none),(max-width:900px),(prefers-reduced-motion:reduce)").matches;

let audioCtx=null,soundOn=true;
function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();if(audioCtx.state==="suspended")audioCtx.resume()}
function tone(f=440,d=.08,type="sine",v=.08){if(!soundOn||!audioCtx)return;let t=audioCtx.currentTime,o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type=type;o.frequency.setValueAtTime(f,t);g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(v,t+.01);g.gain.exponentialRampToValueAtTime(.001,t+d);o.connect(g);g.connect(audioCtx.destination);o.start(t);o.stop(t+d+.02)}
function sound(n){if(n==="move")tone(360,.035,"square",.035);if(n==="rotate")tone(620,.045,"triangle",.055);if(n==="lock")tone(260,.045,"square",.045);if(n==="clear"){tone(760,.07,"triangle",.08);setTimeout(()=>tone(1040,.08,"triangle",.07),70)}if(n==="level"){tone(520,.08);setTimeout(()=>tone(820,.1),90);setTimeout(()=>tone(1120,.12),180)}if(n==="over"){tone(220,.16,"sawtooth",.08);setTimeout(()=>tone(140,.24,"sawtooth",.07),160)}}

function addPetals(count,power=0,clear=false){
  if(clear)petals.innerHTML="";
  if(LOW_FX)return;
  for(let i=0;i<count;i++){
    let e=document.createElement("span"),dur=Math.max(1.4,6.2-power*.18)+Math.random()*4;
    e.className="petal";e.style.left=Math.random()*100+"vw";e.style.animationDuration=dur+"s";e.style.animationDelay=-(Math.random()*dur)+"s";
    e.style.setProperty("--s",.55+Math.random()*1.2);e.style.setProperty("--o",Math.min(1,.42+power*.015+Math.random()*.45));
    e.style.setProperty("--d",(Math.random()>.5?1:-1)*(45+Math.random()*(90+power*2))+"px");
    petals.appendChild(e);
  }
}
function atmosphere(){
  if(LOW_FX){glow=0;return}
  const power=level*4+lines/3,target=Math.min(130,30+power*4);
  glow=Math.min(1,power/35);document.documentElement.style.setProperty("--glow",glow.toFixed(2));
  if(petals.children.length<target)addPetals(target-petals.children.length,power,false);
}

function cloneMatrix(m){return m.map(r=>r.slice())}
function randomPiece(){const type=TYPES[Math.floor(Math.random()*TYPES.length)];return{type,m:cloneMatrix(SHAPES[type]),x:3,y:0}}

function resetGame(){
  board=Array.from({length:ROWS},()=>Array(COLS).fill(null));
  score=0;lines=0;level=1;dropTimer=0;dropInterval=850;glow=0;
  scoreEl.textContent=score;linesEl.textContent=lines;levelEl.textContent=level;
  document.documentElement.style.setProperty("--glow",0);addPetals(30,0,true);
  piece=randomPiece();nextPiece=randomPiece();spawn();draw();
}
function start(){initAudio();resetGame();playing=true;overlay.classList.add("hide");lastTime=0;cancelAnimationFrame(loop);loop=requestAnimationFrame(update)}

function spawn(){
  piece=nextPiece;piece.x=Math.floor((COLS-piece.m[0].length)/2);piece.y=0;
  nextPiece=randomPiece();
  if(collide(piece.x,piece.y,piece.m))gameOver();
}
function rotateMatrix(m){const rows=m.length,cols=m[0].length,out=[];for(let c=0;c<cols;c++){out[c]=[];for(let r=rows-1;r>=0;r--)out[c].push(m[r][c])}return out}
function rotatePiece(){
  const rotated=rotateMatrix(piece.m);
  const kicks=[0,-1,1,-2,2];
  for(const k of kicks){if(!collide(piece.x+k,piece.y,rotated)){piece.x+=k;piece.m=rotated;sound("rotate");draw();return}}
}
function collide(px,py,m){
  for(let y=0;y<m.length;y++)for(let x=0;x<m[y].length;x++)if(m[y][x]){
    const bx=px+x,by=py+y;
    if(bx<0||bx>=COLS||by>=ROWS)return true;
    if(by>=0&&board[by][bx])return true;
  }
  return false;
}
function merge(){
  piece.m.forEach((row,y)=>row.forEach((v,x)=>{if(v&&piece.y+y>=0)board[piece.y+y][piece.x+x]=piece.type}));
  sound("lock");clearLines();spawn();
}
function clearLines(){
  let count=0;
  for(let y=ROWS-1;y>=0;y--){
    if(board[y].every(Boolean)){board.splice(y,1);board.unshift(Array(COLS).fill(null));count++;y++}
  }
  if(count>0){
    const add=[0,100,300,500,800][count]*level;
    score+=add;lines+=count;
    const newLevel=Math.floor(lines/8)+1;
    if(newLevel!==level){level=newLevel;dropInterval=Math.max(180,850-(level-1)*70);levelEl.textContent=level;sound("level")}
    scoreEl.textContent=score;linesEl.textContent=lines;sound("clear");atmosphere();
  }
}

function update(time=0){
  if(!playing)return;
  const delta=time-lastTime;lastTime=time;dropTimer+=delta;
  if(dropTimer>dropInterval){softDrop(false);dropTimer=0;draw()}
  loop=requestAnimationFrame(update);
}
function softDrop(addScore=true){
  if(!collide(piece.x,piece.y+1,piece.m)){piece.y++;if(addScore){score++;scoreEl.textContent=score}}
  else merge();
}
function hardDrop(){let dist=0;while(!collide(piece.x,piece.y+1,piece.m)){piece.y++;dist++}score+=dist*2;scoreEl.textContent=score;merge();draw()}
function move(dx){if(!collide(piece.x+dx,piece.y,piece.m)){piece.x+=dx;sound("move");draw()}}
function gameOver(){playing=false;cancelAnimationFrame(loop);sound("over");msgTitle.textContent=gt("gameOver");msgText.textContent=gt("over",{score,lines});startBtn.textContent=gt("retry");overlay.classList.remove("hide")}

function draw(){bg();drawBoardFrame();drawCells();drawGhost();drawPiece();drawNext()}
function bg(){
  ctx.clearRect(0,0,W,H);
  let g=ctx.createLinearGradient(0,0,W,H);g.addColorStop(0,"#070820");g.addColorStop(.55,"#14103c");g.addColorStop(1,"#050716");ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  if(LOW_FX)return;
  ctx.strokeStyle=`rgba(255,255,255,${.04+glow*.05})`;
  for(let i=0;i<=Math.ceil(W/20);i++){ctx.beginPath();ctx.moveTo(i*20,0);ctx.lineTo(i*20,H);ctx.stroke()}
  for(let i=0;i<=Math.ceil(H/20);i++){ctx.beginPath();ctx.moveTo(0,i*20);ctx.lineTo(W,i*20);ctx.stroke()}
  ctx.save();ctx.globalAlpha=.12+glow*.12;ctx.fillStyle="#ff73d1";ctx.font="bold 72px Segoe UI";ctx.fillText("形",28,92);ctx.fillText("夢",W-112,H-38);ctx.restore();
}
function drawBoardFrame(){
  ctx.save();ctx.shadowColor="#54e6ff";ctx.shadowBlur=LOW_FX?0:20;ctx.strokeStyle="rgba(255,255,255,.55)";ctx.lineWidth=2;roundStroke(PX-8,PY-8,COLS*CELL+16,ROWS*CELL+16,14);ctx.restore();
  roundFill(PX-6,PY-6,COLS*CELL+12,ROWS*CELL+12,12,"rgba(0,0,0,.22)");
}
function drawCells(){
  for(let y=0;y<ROWS;y++)for(let x=0;x<COLS;x++){
    ctx.strokeStyle="rgba(255,255,255,.055)";
    ctx.strokeRect(PX+x*CELL,PY+y*CELL,CELL,CELL);
    if(board[y][x])block(x,y,board[y][x],1);
  }
}
function drawPiece(){piece.m.forEach((row,y)=>row.forEach((v,x)=>{if(v)block(piece.x+x,piece.y+y,piece.type,1)}))}
function drawGhost(){let gy=piece.y;while(!collide(piece.x,gy+1,piece.m))gy++;piece.m.forEach((row,y)=>row.forEach((v,x)=>{if(v)block(piece.x+x,gy+y,piece.type,.18)}))}
function block(x,y,type,alpha=1){
  if(y<0)return;
  const px=PX+x*CELL,py=PY+y*CELL,c=COLORS[type];
  ctx.save();ctx.globalAlpha=alpha;ctx.shadowColor=c;ctx.shadowBlur=LOW_FX?0:(alpha>.5?12:4);
  let g=ctx.createLinearGradient(px,py,px+CELL,py+CELL);g.addColorStop(0,"#fff");g.addColorStop(.22,c);g.addColorStop(1,"#7b5cff");
  roundFill(px+2,py+2,CELL-4,CELL-4,5,g);ctx.strokeStyle="rgba(255,255,255,.45)";ctx.strokeRect(px+4,py+4,CELL-8,CELL-8);ctx.restore();
}
function drawNext(){
  ctx.save();
  ctx.textAlign="center";ctx.fillStyle="#ffd6f4";ctx.font="bold 12px Segoe UI";ctx.fillText(gt("next"),NEXT_X+36,NEXT_Y-10);
  roundFill(NEXT_X,NEXT_Y,72,72,12,"rgba(255,255,255,.08)");
  nextPiece.m.forEach((row,y)=>row.forEach((v,x)=>{if(v)miniBlock(NEXT_X+14+x*14,NEXT_Y+22+y*14,nextPiece.type)}));
  ctx.restore();
}
function miniBlock(x,y,type){
  let c=COLORS[type];
  ctx.save();ctx.shadowColor=c;ctx.shadowBlur=LOW_FX?0:10;
  let g=ctx.createLinearGradient(x,y,x+12,y+12);g.addColorStop(0,"#fff");g.addColorStop(.35,c);g.addColorStop(1,"#7b5cff");
  roundFill(x,y,12,12,3,g);ctx.restore();
}
function roundFill(x,y,w,h,r,fill){ctx.fillStyle=fill;ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.fill()}
function roundStroke(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.stroke()}

document.addEventListener("keydown",e=>{
  if(!playing)return;
  if(e.key==="ArrowLeft"||e.key==="a"||e.key==="A"){e.preventDefault();move(-1)}
  if(e.key==="ArrowRight"||e.key==="d"||e.key==="D"){e.preventDefault();move(1)}
  if(e.key==="ArrowDown"||e.key==="s"||e.key==="S"){e.preventDefault();softDrop(true);draw()}
  if(e.key==="ArrowUp"||e.key==="w"||e.key==="W"){e.preventDefault();rotatePiece()}
  if(e.code==="Space"){e.preventDefault();hardDrop()}
});
cv.addEventListener("pointerdown",e=>{if(!playing)return;e.preventDefault();touchStart={x:e.clientX,y:e.clientY}},{passive:false});
cv.addEventListener("pointerup",e=>{
  if(!playing||!touchStart)return;e.preventDefault();
  const dx=e.clientX-touchStart.x,dy=e.clientY-touchStart.y,adx=Math.abs(dx),ady=Math.abs(dy);
  if(ady>45&&dy>0)hardDrop();
  else if(adx>35)move(dx>0?1:-1);
  else rotatePiece();
  touchStart=null;
},{passive:false});

soundBtn.addEventListener("pointerdown",e=>e.stopPropagation());
soundBtn.onclick=e=>{e.stopPropagation();initAudio();soundOn=!soundOn;soundBtn.textContent=soundOn?"🔊":"🔇";if(soundOn)sound("level")};
startBtn.onclick=start;
resetGame();
</script>
</body>
</html>
