<!DOCTYPE html>
<html lang="vi" data-game="shooter">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Anime Space Shooter</title>
<style>
/* =====================================================
   ANIME SPACE SHOOTER - GAME THỨ 5
   - Kiểu Space Invaders cổ điển
   - 1 file HTML độc lập
   - Phong cách anime / neon / sakura giống các game trước
   - Máy tính: trái/phải hoặc A/D để di chuyển
   - Điện thoại: kéo ngang để di chuyển
   - Phi thuyền tự bắn liên tục
===================================================== */
*{box-sizing:border-box;margin:0;padding:0}
:root{--glow:0}
html,body{width:100%;min-height:100%}
body{
  min-height:100dvh;padding:0;overflow:auto;color:#fff;
  display:flex;justify-content:center;align-items:flex-start;
  font-family:"Segoe UI",Arial,sans-serif;
  background:
    radial-gradient(circle at 15% 20%,rgba(255,126,199,.55),transparent 28%),
    radial-gradient(circle at 85% 15%,rgba(115,190,255,.5),transparent 30%),
    linear-gradient(135deg,#120024,#1b0647 48%,#050919);
}
body:before{
  content:"";position:fixed;inset:-20%;z-index:0;pointer-events:none;filter:blur(8px);
  background:radial-gradient(circle,rgba(255,80,190,calc(.08 + var(--glow)*.18)),transparent 30%);
  animation:pulse 3s ease-in-out infinite;
}
@keyframes pulse{50%{transform:scale(1.06) rotate(2deg);opacity:1}}

/* ===== HOA RƠI ===== */
#petals{position:fixed;inset:0;z-index:1;overflow:hidden;pointer-events:none}
.petal{position:absolute;top:-48px;width:16px;height:10px;border-radius:70% 20% 70% 20%;background:rgba(255,179,221,.9);filter:drop-shadow(0 0 8px rgba(255,165,220,.8));animation:fall linear infinite}
@keyframes fall{
  0%{transform:translateY(-70px) rotate(0) translateX(0) scale(var(--s,1));opacity:0}
  10%{opacity:var(--o,.8)}
  100%{transform:translateY(115vh) rotate(860deg) translateX(var(--d,80px)) scale(var(--s,1));opacity:0}
}

/* ===== KHUNG GAME ===== */
.box{position:relative;z-index:2;width:min(100vw,760px);margin:0 auto;padding:clamp(8px,1.6vw,14px);border:1px solid rgba(255,255,255,.18);border-radius:20px;background:rgba(11,8,36,.72);backdrop-filter:blur(16px);box-shadow:0 0 calc(35px + var(--glow)*30px) rgba(255,79,190,.34),0 0 calc(75px + var(--glow)*55px) rgba(82,170,255,.22),inset 0 0 26px rgba(255,255,255,.06)}
.top{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;margin-bottom:8px}.title{display:flex;align-items:center;gap:8px}h1{font-size:clamp(22px,4vw,34px);white-space:nowrap;text-shadow:0 0 14px rgba(255,107,205,.85)}.sound{width:38px;height:38px;padding:0;border-radius:50%;font-size:18px;background:rgba(255,255,255,.13);border:1px solid rgba(255,255,255,.2)}
.stats{display:grid;grid-template-columns:repeat(3,minmax(74px,1fr));gap:8px}.card{min-width:74px;padding:8px;border-radius:18px;text-align:center;background:linear-gradient(135deg,rgba(255,78,183,.22),rgba(64,174,255,.18));border:1px solid rgba(255,255,255,.18)}.card span{display:block;font-size:12px;color:#d8dcff}.card b{font-size:clamp(20px,3.5vw,26px);text-shadow:0 0 12px rgba(91,201,255,.9)}
.board{--bs:min(100%,720px,calc(100dvh - 112px));position:relative;width:var(--bs);margin:auto;padding:6px;border-radius:20px;background:linear-gradient(135deg,rgba(255,99,197,.5),rgba(89,188,255,.42))}
canvas{display:block;width:100%;height:auto;aspect-ratio:1/1;border-radius:16px;background:#09091d;touch-action:none;box-shadow:inset 0 0 26px rgba(91,201,255,.18)}
.overlay{position:absolute;inset:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:22px;border-radius:18px;background:rgba(5,6,22,.76);backdrop-filter:blur(6px)}.overlay.hide{display:none}.overlay h2{font-size:30px;margin-bottom:8px}.overlay p{max-width:390px;line-height:1.5;margin-bottom:16px;color:#e7e8ff}
.face{width:86px;height:86px;margin-bottom:10px;border-radius:50%;border:3px solid #fff;box-shadow:0 0 25px rgba(255,118,211,.85);background:radial-gradient(circle at 35% 40%,#fff 0 5px,#2a194a 6px 9px,transparent 10px),radial-gradient(circle at 65% 40%,#fff 0 5px,#2a194a 6px 9px,transparent 10px),radial-gradient(circle at 50% 70%,#ff73c7 0 5px,transparent 6px),linear-gradient(135deg,#ffd7ee,#ffc0e7 45%,#fff4fb)}
button{border:0;padding:12px 22px;border-radius:999px;color:#fff;font-weight:700;cursor:pointer;background:linear-gradient(135deg,#ff4fbb,#7b5cff,#39c6ff);box-shadow:0 0 18px rgba(255,79,187,.55)}
@media(max-width:560px){.top{grid-template-columns:1fr}.stats{grid-template-columns:repeat(3,1fr)}.card{min-width:0;padding:8px 6px}.card span{font-size:11px}}
@media(max-height:660px){.board{--bs:min(100%,720px,calc(100dvh - 96px))}}
body{overflow:hidden;align-items:stretch}
.box{width:min(100vw,860px);min-height:100dvh;padding:6px;border:0;border-radius:0;background:rgba(11,8,36,.64)}
.top{grid-template-columns:minmax(0,1fr) auto;gap:5px;margin-bottom:4px}
.title{gap:5px;min-width:0}
h1{font-size:clamp(14px,4vw,20px);overflow:hidden;text-overflow:ellipsis}
.back,.sound{width:30px;height:30px;padding:0;border-radius:50%;font-size:15px;background:rgba(255,255,255,.13);border:1px solid rgba(255,255,255,.2)}
.stats{grid-template-columns:repeat(3,minmax(48px,1fr));gap:4px}
.card{min-width:0;padding:4px 5px;border-radius:10px}
.card span{font-size:9px}.card b{font-size:clamp(14px,4vw,18px)}
.board{--bs:min(calc(100vw - 8px),calc(100dvh - 48px));padding:3px;border-radius:10px}
canvas{border-radius:8px}
.overlay{inset:5px;padding:14px;border-radius:10px}
.overlay h2{font-size:22px}.overlay p{font-size:13px;margin-bottom:12px}.face{width:56px;height:56px}
@media (hover:none),(max-width:900px),(prefers-reduced-motion:reduce){
  body:before,#petals{display:none}
  .box,.overlay{backdrop-filter:none;box-shadow:none}
  canvas,.card,h1,button,.face{box-shadow:none;text-shadow:none}
}
</style>
</head>
<body>
<div id="petals"></div>
<main class="box">
  <div class="top">
    <div class="title"><button id="backBtn" class="back" type="button" title="Quay lại danh sách game" data-game-i18n-title="backTitle">‹</button><h1 data-game-i18n="title">Anime Shooter</h1><button id="soundBtn" class="sound" type="button" data-game-i18n-title="soundTitle">🔊</button></div>
    <div class="stats">
      <div class="card"><span data-game-i18n="score">Điểm</span><b id="score">0</b></div>
      <div class="card"><span data-game-i18n="lives">Mạng</span><b id="lives">3</b></div>
      <div class="card"><span data-game-i18n="level">Cấp</span><b id="level">1</b></div>
    </div>
  </div>
  <section class="board">
    <canvas id="game" width="480" height="480"></canvas>
    <div class="overlay" id="overlay">
      <div class="face"></div>
      <h2 id="msgTitle" data-game-i18n="ready">Sẵn sàng?</h2>
      <p id="msgText" data-game-i18n="intro">Phi thuyền tự bắn. Bạn chỉ cần điều khiển sang trái/phải để né đạn và tiêu diệt quái neon.</p>
      <button id="startBtn" data-game-i18n="start">Bắt đầu chơi</button>
    </div>
  </section>
</main>

<script src="game-i18n.js"></script>
<script>
/* =====================================================
   ANIME SPACE SHOOTER
   Cấp độ:
   - Cấp 1: quái đi chậm
   - Cấp 2: quái bắn nhiều hơn
   - Cấp 3: quái đi nhanh hơn
   - Cấp 4: thêm quái mạnh cần 2 phát
   - Cấp 5+: tốc độ và mật độ đạn tăng dần
===================================================== */

/* ===== 1. HTML ELEMENTS ===== */
const cv=document.getElementById("game"),ctx=cv.getContext("2d"),$=id=>document.getElementById(id);
const scoreEl=$("score"),livesEl=$("lives"),levelEl=$("level"),petals=$("petals"),overlay=$("overlay"),msgTitle=$("msgTitle"),msgText=$("msgText"),startBtn=$("startBtn"),soundBtn=$("soundBtn");
const gameLang=new URLSearchParams(location.search).get("lang")||"vi";
function backToGameMenu(){location.href="../index.html?lang="+encodeURIComponent(gameLang)}
$("backBtn").onclick=e=>{e.stopPropagation();backToGameMenu()};
document.addEventListener("keydown",e=>{if(e.key==="Escape")backToGameMenu()});

/* ===== 2. CONFIG ===== */
const W=cv.width,H=cv.height;
const PLAYER_Y=H-58,PLAYER_W=44,PLAYER_H=34;
const ENEMY_W=34,ENEMY_H=26;

/* ===== 3. STATE ===== */
let player,enemies,bullets,enemyBullets,particles,score,lives,level,playing,loop,keys,glow;
let enemyDir=1,lastShot=0,enemyShotTimer=0,levelNotice=0;
const LOW_FX=matchMedia("(hover:none),(max-width:900px),(prefers-reduced-motion:reduce)").matches;

/* ===== 4. SOUND ===== */
let audioCtx=null,soundOn=true;
function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();if(audioCtx.state==="suspended")audioCtx.resume()}
function tone(f=440,d=.08,type="sine",v=.08){if(!soundOn||!audioCtx)return;let t=audioCtx.currentTime,o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type=type;o.frequency.setValueAtTime(f,t);g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(v,t+.01);g.gain.exponentialRampToValueAtTime(.001,t+d);o.connect(g);g.connect(audioCtx.destination);o.start(t);o.stop(t+d+.02)}
function sound(n){if(n==="shoot")tone(680,.045,"square",.04);if(n==="hit")tone(260,.06,"sawtooth",.06);if(n==="boom"){tone(180,.08,"sawtooth",.08);setTimeout(()=>tone(620,.07,"triangle",.06),55)}if(n==="level"){tone(520,.08);setTimeout(()=>tone(820,.1),90);setTimeout(()=>tone(1120,.12),180)}if(n==="hurt")tone(120,.22,"sawtooth",.09);if(n==="over"){tone(220,.16,"sawtooth",.08);setTimeout(()=>tone(140,.24,"sawtooth",.07),160)}}

/* ===== 5. PETALS / ATMOSPHERE ===== */
function addPetals(count,power=0,clear=false){
  if(clear)petals.innerHTML="";
  if(LOW_FX)return;
  for(let i=0;i<count;i++){
    let e=document.createElement("span"),dur=Math.max(1.4,6.2-power*.18)+Math.random()*4;
    e.className="petal";e.style.left=Math.random()*100+"vw";e.style.animationDuration=dur+"s";e.style.animationDelay=-(Math.random()*dur)+"s";
    e.style.setProperty("--s",.55+Math.random()*1.2);e.style.setProperty("--o",Math.min(1,.42+power*.015+Math.random()*.45));
    e.style.setProperty("--d",(Math.random()>.5?1:-1)*(45+Math.random()*(90+power*2))+"px");petals.appendChild(e);
  }
}
function atmosphere(){
  if(LOW_FX){glow=0;return}
  const power=level*4+score/80,target=Math.min(130,30+power*4);
  glow=Math.min(1,power/35);document.documentElement.style.setProperty("--glow",glow.toFixed(2));
  if(petals.children.length<target)addPetals(target-petals.children.length,power,false);
}

/* ===== 6. RESET / START ===== */
function resetGame(){
  player={x:W/2,y:PLAYER_Y,w:PLAYER_W,h:PLAYER_H,speed:6,cooldown:260};
  bullets=[];enemyBullets=[];particles=[];keys={left:false,right:false};
  score=0;lives=3;level=1;enemyDir=1;lastShot=0;enemyShotTimer=0;levelNotice=0;glow=0;
  scoreEl.textContent=score;livesEl.textContent=lives;levelEl.textContent=level;
  document.documentElement.style.setProperty("--glow",0);addPetals(30,0,true);makeWave();draw();
}
function start(){initAudio();resetGame();playing=true;overlay.classList.add("hide");cancelAnimationFrame(loop);update(0)}

/* ===== 7. ENEMIES ===== */
function makeWave(){
  enemies=[];
  const rows=Math.min(5,3+Math.floor(level/2));
  const cols=8;
  const startX=48,startY=58,gapX=48,gapY=38;
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
    const strong=level>=4&&(r+c)%5===0;
    enemies.push({
      x:startX+c*gapX,y:startY+r*gapY,w:ENEMY_W,h:ENEMY_H,
      hp:strong?2:1,type:strong?"strong":"normal",phase:Math.random()*99
    });
  }
}
function nextLevel(){
  level++;levelEl.textContent=level;levelNotice=70;sound("level");
  bullets=[];enemyBullets=[];makeWave();atmosphere();
}

/* ===== 8. LOOP ===== */
function update(time){
  if(!playing)return;
  movePlayer();
  shoot(time); // Tự bắn liên tục, người chơi chỉ điều khiển sang trái/phải
  moveBullets();moveEnemies();enemyShoot();moveParticles();checkCollisions();
  if(enemies.length===0)nextLevel();
  if(levelNotice>0)levelNotice--;
  draw();loop=requestAnimationFrame(update);
}
function movePlayer(){
  if(keys.left)player.x-=player.speed;
  if(keys.right)player.x+=player.speed;
  player.x=Math.max(24,Math.min(W-24,player.x));
}
function shoot(time=performance.now()){
  if(time-lastShot<player.cooldown)return;
  bullets.push({x:player.x,y:player.y-22,r:4,vy:-8});lastShot=time;sound("shoot");
}
function moveBullets(){
  bullets.forEach(b=>b.y+=b.vy);bullets=bullets.filter(b=>b.y>-20);
  enemyBullets.forEach(b=>b.y+=b.vy);enemyBullets=enemyBullets.filter(b=>b.y<H+30);
}
function moveEnemies(){
  const speed=.45+level*.12;
  let hitEdge=false;
  enemies.forEach(e=>{e.x+=enemyDir*speed;if(e.x<18||e.x+e.w>W-18)hitEdge=true});
  if(hitEdge){enemyDir*=-1;enemies.forEach(e=>e.y+=16+level*1.2)}
  if(enemies.some(e=>e.y+e.h>player.y-10))gameOver();
}
function enemyShoot(){
  enemyShotTimer++;
  const rate=Math.max(30,95-level*9);
  if(enemyShotTimer<rate||enemies.length===0)return;
  enemyShotTimer=0;
  const e=enemies[Math.floor(Math.random()*enemies.length)];
  enemyBullets.push({x:e.x+e.w/2,y:e.y+e.h,r:4,vy:2.5+level*.22});
}
function checkCollisions(){
  bullets.forEach(b=>{
    enemies.forEach(e=>{
      if(hitCircleRect(b,e)){b.dead=true;e.hp--;sound("hit");spark(e.x+e.w/2,e.y+e.h/2,COLORS(e));if(e.hp<=0){e.dead=true;score+=e.type==="strong"?20:10;scoreEl.textContent=score;sound("boom");spark(e.x+e.w/2,e.y+e.h/2,"#ffeb75",12)}}
    });
  });
  bullets=bullets.filter(b=>!b.dead);enemies=enemies.filter(e=>!e.dead);
  enemyBullets.forEach(b=>{if(hitCircleRect(b,{x:player.x-player.w/2,y:player.y-player.h/2,w:player.w,h:player.h})){b.dead=true;hurtPlayer()}});
  enemyBullets=enemyBullets.filter(b=>!b.dead);
}
function hitCircleRect(c,r){return c.x+c.r>r.x&&c.x-c.r<r.x+r.w&&c.y+c.r>r.y&&c.y-c.r<r.y+r.h}
function hurtPlayer(){
  lives--;livesEl.textContent=lives;sound("hurt");spark(player.x,player.y,"#ff4b77",18);
  if(lives<=0)gameOver();
}
function gameOver(){
  playing=false;cancelAnimationFrame(loop);sound("over");
  msgTitle.textContent=gt("gameOver");msgText.textContent=gt("over",{score,level});
  startBtn.textContent=gt("retry");overlay.classList.remove("hide");
}

/* ===== 9. PARTICLES ===== */
function spark(x,y,color="#fff",count=7){
  if(LOW_FX)count=Math.min(count,4);
  for(let i=0;i<count;i++)particles.push({x,y,vx:(Math.random()-.5)*4,vy:(Math.random()-.5)*4,life:24,color});
}
function moveParticles(){particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life--});particles=particles.filter(p=>p.life>0)}
function COLORS(e){return e.type==="strong"?"#fff06a":"#54e6ff"}

/* ===== 10. DRAW ===== */
function draw(){bg();drawEnemies();drawBullets();drawPlayer();drawParticles();drawNotice()}
function bg(){
  ctx.clearRect(0,0,W,H);
  let g=ctx.createLinearGradient(0,0,W,H);g.addColorStop(0,"#070820");g.addColorStop(.55,"#14103c");g.addColorStop(1,"#050716");ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  if(LOW_FX)return;
  ctx.strokeStyle=`rgba(255,255,255,${.04+glow*.05})`;
  for(let i=0;i<=24;i++){ctx.beginPath();ctx.moveTo(i*20,0);ctx.lineTo(i*20,H);ctx.stroke();ctx.beginPath();ctx.moveTo(0,i*20);ctx.lineTo(W,i*20);ctx.stroke()}
  ctx.save();ctx.globalAlpha=.12+glow*.12;ctx.fillStyle="#ff73d1";ctx.font="bold 72px Segoe UI";ctx.fillText("星",30,92);ctx.fillText("夢",W-112,H-38);ctx.restore();
  drawStars();
}
function drawStars(){
  if(LOW_FX)return;
  ctx.save();ctx.fillStyle="rgba(255,255,255,.5)";
  for(let i=0;i<30;i++){const x=(i*73+Date.now()/40)%(W+40)-20,y=(i*47)%H;ctx.fillRect(x,y,2,2)}
  ctx.restore();
}
function drawPlayer(){
  const x=player.x,y=player.y;
  ctx.save();ctx.shadowColor="#54e6ff";ctx.shadowBlur=LOW_FX?0:22;
  let g=ctx.createLinearGradient(x-24,y-20,x+24,y+22);g.addColorStop(0,"#ff5fcc");g.addColorStop(.5,"#fff");g.addColorStop(1,"#54e6ff");ctx.fillStyle=g;
  ctx.beginPath();ctx.moveTo(x,y-28);ctx.lineTo(x+25,y+20);ctx.lineTo(x+8,y+12);ctx.lineTo(x,y+24);ctx.lineTo(x-8,y+12);ctx.lineTo(x-25,y+20);ctx.closePath();ctx.fill();
  ctx.fillStyle="#ffeb75";ctx.beginPath();ctx.moveTo(x-7,y+20);ctx.lineTo(x,y+34);ctx.lineTo(x+7,y+20);ctx.fill();ctx.restore();
}
function drawEnemies(){
  enemies.forEach(e=>{
    const pulse=LOW_FX?0:Math.sin(Date.now()/180+e.phase)*2,color=COLORS(e);
    ctx.save();ctx.shadowColor=color;ctx.shadowBlur=LOW_FX?0:16;
    let g=ctx.createRadialGradient(e.x+e.w/2,e.y+e.h/2,3,e.x+e.w/2,e.y+e.h/2,24);g.addColorStop(0,"#fff");g.addColorStop(.45,color);g.addColorStop(1,"#7b5cff");ctx.fillStyle=g;
    ctx.beginPath();ctx.ellipse(e.x+e.w/2,e.y+e.h/2,e.w/2+4,e.h/2+pulse,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle="#251744";ctx.beginPath();ctx.arc(e.x+12,e.y+12,3,0,Math.PI*2);ctx.arc(e.x+e.w-12,e.y+12,3,0,Math.PI*2);ctx.fill();
    if(e.hp>1){ctx.fillStyle="#fff";ctx.font="bold 11px Segoe UI";ctx.textAlign="center";ctx.fillText("×"+e.hp,e.x+e.w/2,e.y+e.h+12)}
    ctx.restore();
  });
}
function drawBullets(){
  bullets.forEach(b=>orb(b.x,b.y,b.r,"#fff06a","#ff5fcc"));
  enemyBullets.forEach(b=>orb(b.x,b.y,b.r,"#ff4b77","#7b5cff"));
}
function orb(x,y,r,c1,c2){ctx.save();ctx.shadowColor=c1;ctx.shadowBlur=LOW_FX?0:16;let g=ctx.createRadialGradient(x-2,y-2,1,x,y,r*3);g.addColorStop(0,"#fff");g.addColorStop(.45,c1);g.addColorStop(1,c2);ctx.fillStyle=g;ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();ctx.restore()}
function drawParticles(){particles.forEach(p=>{ctx.save();ctx.globalAlpha=p.life/24;ctx.fillStyle=p.color;ctx.shadowColor=p.color;ctx.shadowBlur=LOW_FX?0:10;ctx.fillRect(p.x,p.y,3,3);ctx.restore()})}
function drawNotice(){if(levelNotice<=0)return;ctx.save();ctx.font="bold 22px Segoe UI";ctx.textAlign="center";ctx.shadowColor="#ff5fcc";ctx.shadowBlur=LOW_FX?0:16;ctx.fillStyle="#ffe66d";ctx.fillText(gt("levelPrefix")+" "+level,W/2,38);ctx.restore()}

/* ===== 11. CONTROLS ===== */
document.addEventListener("keydown",e=>{
  if(!playing)return;
  if(e.key==="ArrowLeft"||e.key==="a"||e.key==="A")keys.left=true;
  if(e.key==="ArrowRight"||e.key==="d"||e.key==="D")keys.right=true;
  if(e.code==="Space"){e.preventDefault()}
});
document.addEventListener("keyup",e=>{
  if(e.key==="ArrowLeft"||e.key==="a"||e.key==="A")keys.left=false;
  if(e.key==="ArrowRight"||e.key==="d"||e.key==="D")keys.right=false;

});
cv.addEventListener("pointerdown",e=>{if(!playing)return;e.preventDefault();initAudio();setPlayerX(e.clientX)},{passive:false});
cv.addEventListener("pointermove",e=>{if(!playing)return;e.preventDefault();setPlayerX(e.clientX)},{passive:false});

function setPlayerX(clientX){const rect=cv.getBoundingClientRect();const x=(clientX-rect.left)*(W/rect.width);player.x=Math.max(24,Math.min(W-24,x))}
soundBtn.addEventListener("pointerdown",e=>e.stopPropagation());
soundBtn.onclick=e=>{e.stopPropagation();initAudio();soundOn=!soundOn;soundBtn.textContent=soundOn?"🔊":"🔇";if(soundOn)sound("level")};
startBtn.onclick=start;
resetGame();
</script>
</body>
</html>
